<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cyber Security Checker</title>
  <link rel="stylesheet" href="/css/style.css">
  <script defer src="/js/app.js"></script>
</head>
<body>
  <main class="container">
    <h1>Cyber Security Checker</h1>

    <div class="input-row">
      <input id="urlInput" type="text" placeholder="Enter URL (https://example.com)" />
      <button id="analyzeBtn">Analyze</button>
    </div>

    <div class="actions">
      <button id="googleBtn">Google Safe</button>
      <button id="vtBtn">VirusTotal</button>
      <button id="whoisBtn">Whois</button>
      <button id="downloadBtn">Download PDF</button>
    </div>

    <section class="results">
      <h2>Results</h2>
      <div id="riskBox" class="risk-box hidden" aria-live="polite"></div>
      <pre id="resultArea">No results yet.</pre>
    </section>
  </main>
</body>
</html>
